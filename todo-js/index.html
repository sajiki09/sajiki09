<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO(JS)</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="input-area">
    <input placeholder="TODOを入力" type="text">
    <button>追加</button>
  </div>
  <div class="imcomplete-area">
    <p>未完了のTODO</p>
    <ul>
      <li>
        <div>
          <p>TODOです</p>
          <button>完了</button>
          <button>削除</button>
        </div>
      </li>
    </ul>
  </div>
  <div class="complete-area">
    <p>完了したTODO</p>
    <ul>
      <li>
        <div>
          <p>TODOでした</p>
          <button>戻す</button>
        </div>
      </li>
    </ul>
  </div>

  <script src="./index.js">
  </script>
</body>
</html>
